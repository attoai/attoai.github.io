<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>信息学奥林匹克 - 考试系统</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
    <style>
        /* 全局样式 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Microsoft YaHei', 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            line-height: 1.5;
            background-color: #0a0f1a;
            color: #e0e0e0;
            overflow-x: hidden;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* 轮播容器 - 全屏覆盖 */
        .slideshow-container {
            position: relative;
            width: 100%;
            min-height: 100vh;
            height: auto;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            flex: 1;
        }

        /* 轮播背景 - 固定定位 */
        .slideshow {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: -2;
            --before-bg: url('img/background1.jpg');
        }

        .slideshow::before,
        .slideshow::after {
            content: "";
            position: absolute;
            inset: 0;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            opacity: 0;
            transition: opacity 1.5s ease-in-out;
        }

        .slideshow::before {
            background-image: var(--before-bg);
            opacity: 1;
        }

        .slideshow::after {
            background-image: var(--after-bg, url('img/background2.jpg'));
        }

        .slideshow.show-after::before { opacity: 0; }
        .slideshow.show-after::after { opacity: 1; }

        /* 遮罩层 - 增强可读性 */
        .mask {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(2px);
            z-index: -1;
        }

        /* 主要内容容器 */
        .main-content {
            position: relative;
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            color: #fff;
            z-index: 2;
            padding: 40px 20px 20px 20px;
            min-height: 100vh;
            width: 100%;
            max-width: 1400px;
            margin: 0 auto;
        }

        /* 标题区域 */
        .title-section {
            margin-bottom: 30px;
        }

        .main-title {
            font-size: clamp(2.5rem, 8vw, 4.5rem);
            font-weight: 800;
            margin-bottom: 0.3rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            text-shadow: 2px 2px 8px rgba(0, 0, 0, 0.7);
            animation: fadeInUp 1s ease-out;
            background: linear-gradient(135deg, #fff 0%, #a8c0ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            font-size: clamp(1.1rem, 3.5vw, 1.6rem);
            font-weight: 300;
            text-shadow: 1px 1px 4px rgba(0, 0, 0, 0.5);
            animation: fadeInUp 1.5s ease-out;
            color: rgba(255, 255, 255, 0.9);
        }

        /* 卡片网格布局 */
        .nav-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            width: 100%;
            max-width: 1100px;
            margin: 20px auto;
            animation: fadeInUp 2s ease-out;
        }

        .nav-card {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 20px;
            padding: 25px 15px;
            text-decoration: none;
            color: white;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
        }

        .nav-card:hover {
            transform: translateY(-5px);
            background: rgba(255, 255, 255, 0.15);
            border-color: rgba(255, 255, 255, 0.3);
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.3);
        }

        .nav-card i {
            font-size: 2.5rem;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .nav-card span {
            font-size: 1.1rem;
            font-weight: 600;
        }

        .nav-card small {
            font-size: 0.8rem;
            opacity: 0.8;
            text-align: center;
        }

        /* 快速访问区域 */
        .quick-access {
            width: 100%;
            max-width: 900px;
            margin: 15px auto 20px;
            animation: fadeIn 2.5s ease-out;
        }

        .quick-links {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 12px;
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
            padding: 15px 25px;
            border-radius: 50px;
            border: 1px solid rgba(255, 255, 255, 0.15);
        }

        .quick-link {
            color: white;
            text-decoration: none;
            font-size: 0.95rem;
            font-weight: 500;
            padding: 8px 18px;
            border-radius: 30px;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 6px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid transparent;
        }

        .quick-link:hover {
            background: rgba(255, 255, 255, 0.15);
            border-color: rgba(255, 255, 255, 0.2);
            transform: translateY(-2px);
        }

        .quick-link i {
            font-size: 1rem;
            opacity: 0.9;
        }

        /* 页脚 - 与快速访问链接距离一行 */
        .footer {
            width: 100%;
            text-align: center;
            color: rgba(255, 255, 255, 0.8);
            font-size: 0.9rem;
            padding: 10px 0 20px;
            background: linear-gradient(to top, rgba(0,0,0,0.4), transparent);
            margin-top: 10px; /* 与快速访问链接保持一行距离 */
            line-height: 1.3;
        }

        .footer p {
            margin: 0;
            letter-spacing: 0.5px;
        }

        .footer .copyright-line {
            margin-bottom: 2px;
        }

        .footer .links-line {
            font-size: 0.8rem;
            opacity: 0.7;
        }

        .footer a {
            color: rgba(255, 255, 255, 0.9);
            text-decoration: none;
            margin: 0 4px;
            transition: opacity 0.2s;
        }

        .footer a:hover {
            color: white;
            text-decoration: underline;
            opacity: 1;
        }

        /* 响应式设计 - 电脑端 */
        @media (min-width: 1024px) {
            .main-content {
                padding: 30px 20px 10px 20px;
                justify-content: space-between;
            }
            
            .nav-grid {
                grid-template-columns: repeat(4, 1fr);
                margin: 25px auto;
            }
            
            .quick-access {
                margin: 20px auto 15px;
            }
            
            .footer {
                margin-top: 15px;
                padding: 8px 0 20px;
            }
        }

        /* 平板端 */
        @media (max-width: 1023px) and (min-width: 768px) {
            .main-content {
                padding: 40px 20px 20px 20px;
            }
            
            .nav-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 18px;
                max-width: 700px;
            }
            
            .quick-links {
                border-radius: 40px;
                padding: 15px 20px;
            }
            
            .footer {
                margin-top: 12px;
            }
        }

        /* 手机端 */
        @media (max-width: 767px) {
            .main-content {
                padding: 50px 15px 10px 15px;
                justify-content: flex-start;
            }
            
            .title-section {
                margin-bottom: 20px;
            }
            
            .nav-grid {
                grid-template-columns: 1fr;
                gap: 12px;
                max-width: 320px;
                margin: 15px auto;
            }
            
            .nav-card {
                padding: 16px 15px;
                flex-direction: row;
                text-align: left;
                gap: 12px;
            }
            
            .quick-access {
                margin: 10px auto 10px;
            }
            
            .quick-links {
                border-radius: 30px;
                padding: 12px 12px;
                gap: 8px;
            }
            
            .footer {
                margin-top: 8px;
                padding: 8px 0 15px;
            }
        }

        /* 小屏手机优化 */
        @media (max-width: 374px) {
            .quick-links {
                flex-direction: column;
                align-items: center;
                border-radius: 25px;
                padding: 10px;
            }
            
            .quick-link {
                width: 100%;
                justify-content: center;
            }
        }

        /* 横屏手机优化 */
        @media (max-height: 500px) and (orientation: landscape) {
            .main-content {
                padding: 20px 15px;
            }
            
            .nav-grid {
                grid-template-columns: repeat(2, 1fr);
                max-width: 500px;
                gap: 10px;
            }
            
            .footer {
                margin-top: 5px;
                padding: 5px 0 10px;
            }
        }

        /* 动画定义 */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        /* 触摸优化 */
        .nav-card, .quick-link {
            -webkit-tap-highlight-color: transparent;
            -webkit-touch-callout: none;
            user-select: none;
        }

        /* 深色模式支持 */
        @media (prefers-color-scheme: dark) {
            .mask {
                background: rgba(0, 0, 0, 0.7);
            }
        }

        /* 减少动画（无障碍） */
        @media (prefers-reduced-motion: reduce) {
            * {
                animation: none !important;
                transition: none !important;
            }
            
            .slideshow::before,
            .slideshow::after {
                transition: none;
            }
        }
    </style>
</head>
<body>
    <!-- 轮播图背景 -->
    <div class="slideshow-container">
        <div class="slideshow">
            <div class="mask"></div>
        </div>
        
        <!-- 主要内容 -->
        <div class="main-content">
            <!-- 标题区域 -->
            <div class="title-section">
                <h1 class="main-title">信息学奥林匹克</h1>
                <p class="subtitle">National Olympiad in Informatics</p>
            </div>
            
            <!-- 卡片网格导航 -->
            <div class="nav-grid">
                <a href="/noi" target="_blank" class="nav-card">
                    <i class="fas fa-file-alt"></i>
                    <div>
                        <span>NOI 在线练习</span>
                        <small>全国青少年信息学奥林匹克</small>
                    </div>
                </a>
                <a href="https://isoft.top" target="_blank" class="nav-card">
                    <i class="fas fa-laptop-code"></i>
                    <div>
                        <span>GESP 程序设计</span>
                        <small>图形化编程能力认证</small>
                    </div>
                </a>
                <a href="/gesp" target="_blank" class="nav-card">
                    <i class="fas fa-book"></i>
                    <div>
                        <span>GESP 单选判断</span>
                        <small>选择题、判断题练习</small>
                    </div>
                </a>
                <a href="https://www.noi.cn/" target="_blank" class="nav-card">
                    <i class="fas fa-trophy"></i>
                    <div>
                        <span>竞赛信息</span>
                        <small>最新赛事通知、成绩查询</small>
                    </div>
                </a>
            </div>
            
            <!-- 快速访问链接 -->
            <div class="quick-access">
                <div class="quick-links">
                    <a href="/study" target="_blank" class="quick-link">
                        <i class="fas fa-play-circle"></i>学习资源
                    </a>
                    <a href="/csp" target="_blank" class="quick-link">
                        <i class="fas fa-history"></i>历年真题
                    </a>
                    <a href="/code" target="_blank" class="quick-link">
                        <i class="fas fa-cog fa-spin"></i>程序代码
                    </a>
                    <a href="https://www.noi.cn/" target="_blank" class="quick-link">
                        <i class="fas fa-comments"></i>竞赛信息
                    </a>
                    <a href="/about" target="_blank" class="quick-link">
                        <i class="fas fa-info-circle"></i>关于我们
                    </a>
                </div>
            </div>
        </div>
        
        <!-- 页脚 - 与快速访问链接保持一行距离 -->
        <div class="footer">
            <p class="copyright-line">Copyright &copy; 2025 AoSai All Rights Reserved</p>
            <p class="links-line">
                <a href="/privacy">隐私政策</a> · <a href="/terms">使用条款</a> · <a href="/contact">联系我们</a>
            </p>
        </div>
    </div>

    <script>
        // 轮播图片配置 - 使用本地图片
        const slideshow = document.querySelector(".slideshow");
        const images = [
            "img/background1.jpg",
            "img/background2.jpg", 
            "img/background3.jpg"
        ];
        
        let index = 0;
        let showingBefore = true;

        // 预加载图片
        images.forEach(src => {
            const img = new Image();
            img.src = src;
            img.onerror = function() {
                console.warn('图片加载失败: ' + src);
            };
        });

        // 轮播切换
        setInterval(() => {
            index = (index + 1) % images.length;
            
            if (showingBefore) {
                slideshow.style.setProperty("--after-bg", `url(${images[index]})`);
                slideshow.classList.add("show-after");
            } else {
                slideshow.style.setProperty("--before-bg", `url(${images[index]})`);
                slideshow.classList.remove("show-after");
            }
            
            showingBefore = !showingBefore;
        }, 6000);

        // 平滑滚动到锚点
        document.querySelectorAll('a[href^="#"]').forEach(anchor => {
            anchor.addEventListener('click', function (e) {
                e.preventDefault();
                const targetId = this.getAttribute('href');
                if (targetId !== '#') {
                    document.querySelector(targetId)?.scrollIntoView({
                        behavior: 'smooth'
                    });
                }
            });
        });

        // 横屏检测
        window.addEventListener('orientationchange', function() {});
        
        // 触摸优化
        document.addEventListener('touchstart', function() {}, { passive: true });

        // 图片加载失败备用
        function setDefaultBackground() {
            document.querySelector('.slideshow').style.backgroundColor = '#1a1a2e';
        }

        const firstImg = new Image();
        firstImg.src = images[0];
        firstImg.onerror = setDefaultBackground;
    </script>
</body>
</html>
